name: Daily Rankings Update

on:
  schedule:
    # Runs every day at 06:00 UTC (2am ET / matches update overnight)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to commit updated index.html back to repo

jobs:
  update-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch and update rankings
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python update_rankings.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: auto-update Elo + FIFA rankings $(date -u '+%Y-%m-%d')"
          git push
