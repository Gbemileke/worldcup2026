name: Daily Rankings Update

on:
  schedule:
    - cron: '0 6 * * *'    # every day at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Update Elo, FIFA pts and Polymarket odds
        run: python update_rankings.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/team_data.json
          git diff --staged --quiet \
            && echo "No changes — already up to date" \
            || git commit -m "auto: rankings + odds update $(date -u +'%Y-%m-%d')" && git push
