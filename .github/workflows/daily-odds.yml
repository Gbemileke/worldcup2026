name: Update Group Odds (Manual)

on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Group letter to update (A-L), or ALL'
        required: false
        default: 'ALL'

permissions:
  contents: write

jobs:
  update-odds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update group odds
        run: python update_odds.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/groups.json index.html
          git diff --staged --quiet \
            || git commit -m "odds: update group predictions $(date -u +'%Y-%m-%d')" && git push
