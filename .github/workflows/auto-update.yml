name: Auto-Update Match Data

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Step 1 — Fetch match data (scores, goals, stats)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python update_match_stats.py

      - name: Step 2 — Update FIFA rankings + deltas
        run: python update_rankings.py

      - name: Step 3 — Update team form from WC results
        run: python update_site.py --section form

      - name: Step 4 — Full rebuild of index.html
        run: python update_site.py

      - name: Step 5 — Patch FIFA rank deltas into TEAM_DATA
        run: |
          python - << 'EOF'
          import json, re

          with open('index.html') as f: c = f.read()
          with open('data/team_data.json') as f: teams = json.load(f)

          js_start = c.find('<script>') + 8
          js_end   = c.find('</script>', js_start)
          js       = c[js_start:js_end]

          td_start = js.find('var TEAM_DATA = {')
          td_end   = js.find('\n};', td_start) + 3
          td       = js[td_start:td_end]

          for name, data in teams.items():
              if data.get('group','') == '': continue
              pd = data.get('fifaPtsDelta', 0)
              rd = data.get('fifaRankDelta', 0)
              pt = data.get('fifaPts', 0)
              escaped = re.escape(name)
              # Update fifaPts
              td = re.sub(rf"('{escaped}'[^}}]*?fifaPts:)([\d.]+)",
                          lambda m,p=pt: m.group(1)+str(p), td, count=1)
              # Update or insert delta fields
              if re.search(rf"'{escaped}'[^}}]*fifaPtsDelta", td):
                  td = re.sub(rf"('{escaped}'[^}}]*fifaPtsDelta:)([-\d.]+)",
                              lambda m,p=pd: m.group(1)+str(p), td, count=1)
                  td = re.sub(rf"('{escaped}'[^}}]*fifaRankDelta:)([-\d]+)",
                              lambda m,r=rd: m.group(1)+str(r), td, count=1)
              else:
                  td = re.sub(
                      rf"('{escaped}'[^}}]*?fifaPts:[\d.]+)(,)",
                      lambda m,p=pd,r=rd: m.group(1)+f', fifaPtsDelta:{p}, fifaRankDelta:{r}'+m.group(2),
                      td, count=1)

          js = js[:td_start] + td + js[td_end:]
          c  = c[:js_start] + js + c[js_end:]
          with open('index.html','w') as f: f.write(c)
          print("✓ FIFA rank deltas patched into TEAM_DATA")
          EOF

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/ update_rankings.py
          git diff --staged --quiet \
            && echo "No changes — already up to date" \
            || (git commit -m "auto: $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
