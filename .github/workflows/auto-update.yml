name: Auto-Update Match Data

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Step 1 — Scrape ESPN (goals, stats)
        env:
          ALLSPORTSAPI_KEY: ${{ secrets.ALLSPORTSAPI_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python update_match_stats.py

      - name: Step 2 — Validate data integrity + auto-fix
        run: python update_wc.py --section validate

      - name: Step 3 — Sync goals to index.html
        run: python update_wc.py --section goals

      - name: Step 4 — Sync match stats to index.html
        run: python update_wc.py --section stats

      - name: Step 5 — Re-apply knockout results (preserves any results you added)
        run: python update_wc.py --section knockout

      - name: Step 6 — Update upcoming fixtures (filter played matches)
        run: python update_wc.py --section upcoming

      - name: Step 7 — Recompute team form
        run: python update_wc.py --section form

      - name: Step 8 — Update snapshot cards
        run: python update_wc.py --section snapshot

      - name: Step 9 — Build stamp
        run: python update_wc.py --section stamp

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --staged --quiet \
            && echo "No changes" \
            || (git commit -m "auto: $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
