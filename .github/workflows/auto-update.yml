name: Auto-Update Match Data

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest match data from football-data.org
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python update_match_stats.py

      - name: Sync data files (scores, goals, stats) into JSON
        run: |
          python update_site.py --section matches
          python update_site.py --section goals
          python update_site.py --section stats

      - name: Remove completed matches from upcoming fixtures
        run: python update_site.py --section sync

      - name: Update snapshot analytics cards
        run: python update_site.py --section snapshot

      - name: Final full rebuild
        run: python update_site.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --staged --quiet \
            && echo "No changes — already up to date" \
            || git commit -m "auto: match data update $(date -u +'%Y-%m-%d %H:%M UTC')" && git push
