name: Update Match Analytics

on:
  schedule:
    # Runs every 3 hours — catches matches that finish overnight
    - cron: '0 3,6,9,12,15,18,21 * * *'
  workflow_dispatch:
    # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch finished matches and update index.html
        id: update
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python update_match_stats.py
        # continue-on-error: false — let a real error fail the step
        # but the script now exits 0 for missing token / no new data

      - name: Commit if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet \
            && echo "No changes to commit — index.html already up to date" \
            || git commit -m "chore: match stats $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
